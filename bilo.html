<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1024">
  <title>Physics-Informed Machine Learning Playground</title>
  <link rel="stylesheet" href="bundle.css" type="text/css">
  <link rel="stylesheet" href="bilo.css" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500|Material+Icons" rel="stylesheet">
  <script src="lib.js"></script>
</head>
<body id="bilo-page">
  <header>
    <h1 class="l--page">Physics-Informed Machine Learning Playground</h1>
  </header>

  <div id="top-controls">
    <div class="container l--page">
      <div class="control-row">
        <div class="timeline-controls">
          <button class="mdl-button mdl-js-button mdl-button--icon" id="reset-button" title="Reset">
            <i class="material-icons">replay</i>
          </button>
          <button class="mdl-button mdl-js-button mdl-button--fab mdl-button--colored" id="play-pause-button" title="Play/Pause">
            <i class="material-icons">play_arrow</i>
            <i class="material-icons">pause</i>
          </button>
          <button class="mdl-button mdl-js-button mdl-button--icon" id="step-button" title="Step">
            <i class="material-icons">skip_next</i>
          </button>
        </div>
          <div class="control">
          <span class="label">Step</span>
          <span class="value" id="iter-number">0</span>
        </div>
        <div class="control bilo-toggle-group">
          <span class="toggle-label">ODE</span>
          <div class="bilo-toggle" id="odeToggle">
            <button type="button" class="bilo-toggle-btn active" data-value="exponential">u'=au</button>
            <button type="button" class="bilo-toggle-btn" data-value="logistic">u'=au(1−u)</button>
          </div>
        </div>
          <div class="control">
          <label for="u0">Initial u(0)</label>
          <input type="number" id="u0" min="0.01" max="2" step="0.01" value="1" class="control-input" title="u(0); default 1 (exponential) or 0.1 (logistic)">
        </div>
      </div>
      <div class="control-row">
        <div class="control bilo-toggle-group">
          <span class="toggle-label">Model</span>
          <div class="bilo-toggle" id="modelTypeToggle">
            <button type="button" class="bilo-toggle-btn active" data-value="bilo">BILO</button>
            <button type="button" class="bilo-toggle-btn" data-value="pinn">PINN</button>
          </div>
        </div>
        <div class="control bilo-toggle-group">
          <span class="toggle-label">Optimizer</span>
          <div class="bilo-toggle" id="optimizerToggle">
            <button type="button" class="bilo-toggle-btn active" data-value="sgd">GD</button>
            <button type="button" class="bilo-toggle-btn" data-value="adam">ADAM</button>
          </div>
        </div>
        <div class="control bilo-toggle-group">
          <span class="toggle-label">Mode</span>
          <div class="bilo-toggle" id="modeToggle">
            <button type="button" class="bilo-toggle-btn active" data-value="pretrain">Pretrain</button>
            <button type="button" class="bilo-toggle-btn" data-value="finetune">Finetune</button>
          </div>
        </div>
        <div class="control">
        <label for="aParam">Parameter a</label>
        <input type="number" id="aParam" min="0.1" max="10" step="0.1" value="1" class="control-input">
      </div>
        <div class="control">
        <label for="aParamGT">a<sub>GT</sub></label>
        <input type="number" id="aParamGT" min="0.1" max="10" step="0.1" value="2" class="control-input">
      </div>
        <div class="control">
        <label for="nPoints">Residual points</label>
        <input type="number" id="nPoints" min="3" max="101" value="21" class="control-input" title="Collocation points for L_res (and L_grad in BILO)">
      </div>
        <div class="control">
        <label for="nDataPoints">Data points</label>
        <input type="number" id="nDataPoints" min="2" max="101" value="21" class="control-input" title="Points for L_data (finetune)">
      </div>
        <div class="control">
        <label for="learningRate">lr<sub>W</sub></label>
        <input type="number" id="learningRate" min="0.001" max="0.5" step="0.001" value="0.02" class="control-input">
      </div>
        <div class="control">
        <label for="lrA">lr<sub>a</sub></label>
        <input type="number" id="lrA" min="0.0001" max="0.05" step="0.0001" value="0.001" class="control-input">
      </div>
        <div class="control">
        <label for="wRes">w<sub>res</sub></label>
        <input type="number" id="wRes" min="0" max="2" step="0.1" value="1" class="control-input">
      </div>
      <div class="control" id="wGradControl">
        <label for="wGrad">w<sub>grad</sub></label>
        <input type="number" id="wGrad" min="0" max="2" step="0.1" value="0.1" class="control-input" title="BILO only">
      </div>
        <div class="control">
        <label for="wData">w<sub>data</sub></label>
        <input type="number" id="wData" min="0" max="2" step="0.1" value="0.5" class="control-input">
      </div>
        <div class="control">
        <label for="noise">Noise</label>
        <input type="number" id="noise" min="0" max="0.5" step="0.01" value="0" class="control-input">
      </div>
    </div>
  </div>


  <div id="main-part" class="l--page">
    <div class="column features bilo-network-col">
      <div class="bilo-network-header">
        <h4>Network</h4>
        <div class="bilo-network-controls">
          <div class="control bilo-plus-minus">
            <label>Layers</label>
            <div class="plus-minus-row">
              <button type="button" class="mdl-button mdl-js-button mdl-button--icon" id="depth-minus" title="Fewer layers">
                <i class="material-icons">remove</i>
              </button>
              <span class="plus-minus-value" id="depth-value">2</span>
              <button type="button" class="mdl-button mdl-js-button mdl-button--icon" id="depth-plus" title="More layers">
                <i class="material-icons">add</i>
              </button>
            </div>
          </div>
          <div class="control bilo-plus-minus">
            <label>Neurons</label>
            <div class="plus-minus-row">
              <button type="button" class="mdl-button mdl-js-button mdl-button--icon" id="nHidden-minus" title="Fewer neurons">
                <i class="material-icons">remove</i>
              </button>
              <span class="plus-minus-value" id="nHidden-value">4</span>
              <button type="button" class="mdl-button mdl-js-button mdl-button--icon" id="nHidden-plus" title="More neurons">
                <i class="material-icons">add</i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div id="network"></div>
    </div>
    <div class="column output bilo-output-col">
      <h4>Output</h4>
      <div class="metrics"></div>
      <h4 class="bilo-plot-title">Prediction</h4>
      <div id="plot-1d"></div>
      <h4 class="bilo-plot-title">Loss</h4>
      <div id="loss-chart"></div>
    </div>
  </div>


  <script src="bilo.js"></script>
</body>
</html>
